name: deploy

# Deploy to Fly.io — MANUAL ONLY pre-launch.
#
# The workflow_run auto-deploy trigger is commented out below to keep
# the Actions tab quiet (every push to main was firing a skipped
# deploy run, which still counts as a workflow run in the UI). With
# only workflow_dispatch enabled, this workflow runs only when you
# manually click "Run workflow" in the Actions tab.
#
# When you're ready to flip on auto-deploy on launch day:
#   1) fly apps create soteria  (+ fly volumes create ..., per docs/runbooks/go-live.md)
#   2) fly tokens create deploy → paste as repo secret FLY_API_TOKEN
#      (Settings → Secrets and variables → Actions → Secrets tab)
#   3) Uncomment the workflow_run block below; comment workflow_dispatch out.
on:
  workflow_dispatch:
  # workflow_run:
  #   workflows: ["ci"]
  #   types: [completed]
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Never let two deploys overlap; let an in-flight one finish.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
