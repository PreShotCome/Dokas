name: deploy

# Deploy to Fly.io.
#
# Auto-deploy: fires when CI completes on `main`. The `if:` guard drops
# the run if CI failed (or was cancelled), so a red build never ships.
# workflow_dispatch is also kept so you can manually re-run a deploy
# from the Actions UI without pushing a new commit — useful for a
# rollback (dispatch on an older SHA) or a secrets-only redeploy.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # workflow_run fires on any conclusion (success, failure, cancelled) —
    # only ship when CI actually passed. workflow_dispatch has no
    # `workflow_run` object, so the second clause lets manual runs through.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Never let two deploys overlap; let an in-flight one finish.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
