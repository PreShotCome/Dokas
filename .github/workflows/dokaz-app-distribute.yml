name: Build & Distribute Dokaz APK

# Mirrors plutus-app's CI: build the Flutter responder app and ship it to
# Firebase App Distribution so testers get it on their phone (no manual
# `flutter run`). Dokaz's app lives in app/, so every step sets that as the
# working directory. Debug-signed for now (no keystore secrets needed, like
# tech-support); switch to a release keystore before a Play Store launch.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   DOKAZ_FIREBASE_APP_ID   — Android app id, e.g. 1:724281899690:android:aa31...
#   FIREBASE_SERVICE_ACCOUNT — full JSON of a service-account key with the
#                              "Firebase App Distribution Admin" role
# Prereqs committed to the repo: app/android/ (generated by `flutter create`),
# app/lib/firebase_options.dart, and app/android/app/google-services.json.

on:
  push:
    branches: [ main, 'claude/**' ]
    paths: [ 'app/**', '.github/workflows/dokaz-app-distribute.yml' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.DOKAZ_FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          testers: ianrocks62@gmail.com
          file: app/build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: "Dokaz — know the moment a backup fails | ${{ github.sha }}"
