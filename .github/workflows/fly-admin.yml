name: fly-admin

# Manual-only admin escape hatch: run a flyctl command against the app using
# the deploy token, so machine topology can be inspected/fixed from CI without
# a local Fly CLI. Inputs are restricted to a short allowlist of safe commands.
on:
  workflow_dispatch:
    inputs:
      command:
        description: "flyctl command to run"
        required: true
        default: "machines-list"
        type: choice
        options:
          - machines-list
          - status
          - scale-count-1
          - kill-release-machines
          - set-evidence-keys

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Run
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          case "${{ inputs.command }}" in
            machines-list) flyctl machines list -a dokaz ;;
            status)        flyctl status -a dokaz ;;
            scale-count-1) flyctl scale count 1 -a dokaz -y ;;
            kill-release-machines)
              # Destroy stray fly_app_release_command machines left behind by a
              # timed-out release_command. They run the app image and so steal
              # drill jobs from the River queue, but lack the volume + latest
              # image, failing every drill. Only the 'app' group should run.
              flyctl machines list -a dokaz --json \
                | jq -r '.[] | select((.config.metadata.fly_process_group // "") == "fly_app_release_command") | .id' \
                | while read -r id; do
                    echo "destroying stray release machine $id"
                    flyctl machine destroy "$id" -a dokaz --force
                  done ;;
            set-evidence-keys)
              # Generate stable evidence keys IN THE RUNNER and set them as Fly
              # secrets, so the values never appear in chat, code, or logs.
              # Without these the server uses ephemeral keys that reset on every
              # restart, so signatures stop verifying and at-rest evidence stops
              # decrypting. Idempotent: skips if already set, never rotates.
              if flyctl secrets list -a dokaz --json | jq -e '.[] | select(.Name=="EVIDENCE_SIGNING_KEY")' >/dev/null; then
                echo "evidence keys already set — leaving them as-is (no rotation)"
              else
                ENC="$(openssl rand -base64 32)"
                SIGN="$(openssl genpkey -algorithm ed25519)"
                flyctl secrets set -a dokaz \
                  EVIDENCE_ENCRYPTION_KEY="$ENC" \
                  EVIDENCE_SIGNING_KEY="$SIGN" >/dev/null
                echo "evidence keys generated and set (values not printed)"
              fi ;;
            *) echo "unknown command"; exit 1 ;;
          esac
