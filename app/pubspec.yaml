name: dokaz
description: Dokaz — the responder app. Know the moment a backup drill fails or a check-in goes dark.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  # Push only — Dokaz authenticates against its own backend, not Firebase Auth.
  # firebase_core init is guarded (see main.dart): the app runs without any
  # Firebase config, and push activates once google-services.json / the iOS
  # plist are added by the owner.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_lints: ^3.0.0
  # App-launcher icon generator. Android icons are already committed under
  # res/mipmap-*; run `dart run flutter_launcher_icons` to (re)generate the
  # iOS AppIcon set + Android adaptive icons from assets/icon.png.
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#eef4ff"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/turtle.svg
