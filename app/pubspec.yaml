name: vesta
description: Vesta — the responder app. Know the moment a backup drill fails or a check-in goes dark.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  # Push only — Vesta authenticates against its own backend, not Firebase Auth.
  # firebase_core init is guarded (see main.dart): the app runs without any
  # Firebase config, and push activates once google-services.json / the iOS
  # plist are added by the owner.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
