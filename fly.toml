# Fly.io deployment manifest for the Dokaz app server.
#
# Secrets are NOT set here — run `fly secrets set KEY=value` for each of:
#   DATABASE_URL, SESSION_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
#   STRIPE_PRICE_STARTER, STRIPE_PRICE_PRO, EVIDENCE_SIGNING_KEY,
#   EVIDENCE_ENCRYPTION_KEY, POSTMARK_TOKEN, and any other configured seam.
# See docs/runbooks/ for each integration.

# Fly app + evidence-volume names. (Earlier deploys used "soteria"; renamed to
# "dokaz" for the new brand. The displayed product name is Dokaz everywhere.)
app = "dokaz"
# iad (Ashburn, Virginia) — co-located with the Neon database in AWS us-east-1.
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# No release_command: the server applies migrations itself at startup from
# the SQL embedded in the binary (see cmd/server/main.go + internal/dbmigrate).
# The previous `/app/migrate up` release machine frequently false-timed-out
# waiting to be destroyed and aborted the entire deploy, so the new image
# never shipped. Self-migration keeps a deploy to a single, reliable step.
# Single-machine deployment, so there is no migration race on boot.

[env]
  ADDR = ":8080"
  ENV = "prod"
  # Evidence PDFs live on a persistent volume (see [mounts]) so they
  # survive deploys. For multi-machine scale, switch to S3/R2 instead by
  # setting the EVIDENCE_S3_* secrets — see docs/runbooks/s3.md.
  EVIDENCE_DIR = "/data/evidence"

# Persistent volume for evidence. Create it once before the first deploy:
#   fly volumes create dokaz_evidence --region sea --size 1
[mounts]
  source = "dokaz_evidence"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Single-machine deployment: the evidence volume below is pinned to this
  # machine, so a second instance would either fail to start or write
  # evidence to a different volume that the first machine cannot read. To
  # scale beyond one machine, move evidence to S3/R2 (set EVIDENCE_S3_*
  # — see docs/runbooks/s3.md) and then flip auto_start_machines = true.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/readyz"
    timeout = "3s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
