# Fly.io deployment manifest for the Selket app server.
#
# Secrets are NOT set here — run `fly secrets set KEY=value` for each of:
#   DATABASE_URL, SESSION_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
#   STRIPE_PRICE_STARTER, STRIPE_PRICE_PRO, EVIDENCE_SIGNING_KEY,
#   EVIDENCE_ENCRYPTION_KEY, POSTMARK_TOKEN, and any other configured seam.
# See docs/runbooks/ for each integration.

# The Fly app and volume names below intentionally remain "soteria" /
# "soteria_evidence": the brand renamed (Soteria → Selket), but the
# deployed Fly app + its attached evidence volume keep their original
# identifiers. Renaming them requires creating a new Fly app + migrating
# the volume — tracked separately. The displayed product name is Selket
# everywhere user-facing.
app = "soteria"
# sea (Seattle) — close to the Neon database in AWS us-west-2 (Oregon).
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

# Runs migrations in a one-off machine on the new image before the deploy
# is promoted. DATABASE_URL must be set as a secret for this to work.
[deploy]
  release_command = "/app/migrate up"

[env]
  ADDR = ":8080"
  ENV = "prod"
  # Evidence PDFs live on a persistent volume (see [mounts]) so they
  # survive deploys. For multi-machine scale, switch to S3/R2 instead by
  # setting the EVIDENCE_S3_* secrets — see docs/runbooks/s3.md.
  EVIDENCE_DIR = "/data/evidence"

# Persistent volume for evidence. Create it once before the first deploy:
#   fly volumes create soteria_evidence --region sea --size 1
[mounts]
  source = "soteria_evidence"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Single-machine deployment: the evidence volume below is pinned to this
  # machine, so a second instance would either fail to start or write
  # evidence to a different volume that the first machine cannot read. To
  # scale beyond one machine, move evidence to S3/R2 (set EVIDENCE_S3_*
  # — see docs/runbooks/s3.md) and then flip auto_start_machines = true.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/readyz"
    timeout = "3s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
