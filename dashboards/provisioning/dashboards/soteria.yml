# Grafana dashboard provisioning — loads the committed dashboard JSON so the
# dashboards are infrastructure, not a manual import. Mount this file at
# /etc/grafana/provisioning/dashboards/ and mount the repo's dashboards/
# directory at the `path` below.
apiVersion: 1

providers:
  - name: soteria
    type: file
    # Dashboards provisioned from a file are read-only in the Grafana UI;
    # edits go through the repo.
    allowUiUpdates: false
    options:
      # Where the dashboard JSON files are mounted inside the Grafana
      # container. Mount the repo's dashboards/ directory here.
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
