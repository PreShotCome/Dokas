<?xml version="1.0" encoding="UTF-8"?>
<!--
  Vesta — app icon / favicon. Square, navy-to-black background built
  in (so it works against any host surface — iOS Home Screen, Slack
  avatar, GitHub avatar). The mark sits inside a generous safe margin
  (~10%) so it doesn't get clipped by rounded corners.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Vesta">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ambr" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#7f1d1d"/>
      <stop offset="22%"  stop-color="#b91c1c"/>
      <stop offset="55%"  stop-color="#eab308"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#fefce8" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#facc15" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square navy backdrop. iOS / Android will clip this further; the 22% radius matches Apple's "squircle" rounding. -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Mark, centered within the 512 canvas (mark viewBox is 320). -->
  <g transform="translate(96, 96) scale(1)">
    <circle cx="160" cy="60" r="46" fill="url(#halo)"/>
    <path d="M 148 196 C 120 184, 90 168, 60 134 C 44 112, 38 92, 46 74 C 56 92, 74 110, 98 130 C 122 148, 140 168, 152 192 Z" fill="url(#ambr)"/>
    <path d="M 172 196 C 200 184, 230 168, 260 134 C 276 112, 282 92, 274 74 C 264 92, 246 110, 222 130 C 198 148, 180 168, 168 192 Z" fill="url(#ambr)"/>
    <path d="M 160 110 C 150 134, 142 162, 144 196 C 146 224, 152 254, 156 280 C 158 290, 159 298, 160 304 C 161 298, 162 290, 164 280 C 168 254, 174 224, 176 196 C 178 162, 170 134, 160 110 Z" fill="url(#ambr)"/>
    <path d="M 160 22 L 164 52 L 196 60 L 164 68 L 160 100 L 156 68 L 124 60 L 156 52 Z" fill="#fef08a"/>
    <circle cx="160" cy="60" r="2.5" fill="#ffffff"/>
  </g>
</svg>
