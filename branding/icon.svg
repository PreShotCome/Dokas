<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- flippers (steely gray) -->
  <g fill="#8FA3B8">
    <ellipse cx="15" cy="25" rx="6.5" ry="4.6" transform="rotate(-38 15 25)"/>
    <ellipse cx="49" cy="25" rx="6.5" ry="4.6" transform="rotate(38 49 25)"/>
    <ellipse cx="15" cy="46" rx="6.5" ry="4.6" transform="rotate(38 15 46)"/>
    <ellipse cx="49" cy="46" rx="6.5" ry="4.6" transform="rotate(-38 49 46)"/>
  </g>
  <!-- head -->
  <circle cx="32" cy="11" r="6.5" fill="#8FA3B8"/>
  <circle cx="29.6" cy="10.2" r="1.1" fill="#1B2027"/>
  <circle cx="34.4" cy="10.2" r="1.1" fill="#1B2027"/>
  <!-- shell -->
  <ellipse cx="32" cy="35" rx="21" ry="18" fill="#6E9BF0"/>
  <ellipse cx="32" cy="35" rx="21" ry="18" fill="none" stroke="#4F7BE0" stroke-width="2.4"/>
  <!-- central scute -->
  <path d="M32 23 L42 30 L42 41 L32 47 L22 41 L22 30 Z"
        fill="#5B8DEF" stroke="#F48FB1" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- scute seams radiating to the rim -->
  <g stroke="#4F7BE0" stroke-width="1.8" stroke-linecap="round">
    <line x1="32" y1="23" x2="32" y2="17.5"/>
    <line x1="42" y1="30" x2="49" y2="27"/>
    <line x1="42" y1="41" x2="49" y2="45"/>
    <line x1="32" y1="47" x2="32" y2="52.5"/>
    <line x1="22" y1="41" x2="15" y2="45"/>
    <line x1="22" y1="30" x2="15" y2="27"/>
  </g>
  <!-- pink center accent -->
  <circle cx="32" cy="35.5" r="2.6" fill="#F48FB1"/>
</svg>
