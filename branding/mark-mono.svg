<!--
  Selket — monochrome mark. Single solid colour, for stamps, embossing,
  letterhead, single-colour print, dark-mode UI, and any context where
  the gradient would not survive (favicon at very small size, fax,
  laser-engraved metal, etc.). Pair this with `currentColor` in HTML.
-->
