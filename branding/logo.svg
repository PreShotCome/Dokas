<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="shell" x1="32" y1="12" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FA8F6"/>
      <stop offset="1" stop-color="#4F7BE0"/>
    </linearGradient>
  </defs>
  <!-- head + four flippers (steely gray) -->
  <g fill="#7A8A9C">
    <ellipse cx="14" cy="24" rx="6" ry="4.2" transform="rotate(-40 14 24)"/>
    <ellipse cx="50" cy="24" rx="6" ry="4.2" transform="rotate(40 50 24)"/>
    <ellipse cx="14" cy="47" rx="6" ry="4.2" transform="rotate(40 14 47)"/>
    <ellipse cx="50" cy="47" rx="6" ry="4.2" transform="rotate(-40 50 47)"/>
    <circle cx="32" cy="9.5" r="6"/>
  </g>
  <!-- shell: bold rounded hexagon -->
  <path d="M32 13 L51 24 L51 46 L32 57 L13 46 L13 24 Z" fill="url(#shell)"
        stroke="#3F63C4" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- central scute -->
  <path d="M32 22 L43.5 28.5 L43.5 41.5 L32 48 L20.5 41.5 L20.5 28.5 Z"
        fill="#5B8DEF" stroke="#3F63C4" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- seams from the central scute to the rim -->
  <g stroke="#3F63C4" stroke-width="1.6" stroke-linecap="round">
    <line x1="32" y1="22" x2="32" y2="13"/>
    <line x1="43.5" y1="28.5" x2="51" y2="24"/>
    <line x1="43.5" y1="41.5" x2="51" y2="46"/>
    <line x1="32" y1="48" x2="32" y2="57"/>
    <line x1="20.5" y1="41.5" x2="13" y2="46"/>
    <line x1="20.5" y1="28.5" x2="13" y2="24"/>
  </g>
  <!-- verified check: proof your backup restores -->
  <path d="M26.3 35 L30.5 39.2 L38.2 30.2" fill="none" stroke="#FFFFFF"
        stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="32" cy="35" r="0.1" fill="#F48FB1"/>
</svg>
