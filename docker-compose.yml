services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: restoredrill
      POSTGRES_PASSWORD: restoredrill
      POSTGRES_DB: restoredrill
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restoredrill"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
