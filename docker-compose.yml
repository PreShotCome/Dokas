services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: soteria
      POSTGRES_PASSWORD: soteria
      POSTGRES_DB: soteria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soteria"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
